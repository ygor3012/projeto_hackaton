<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Simplifica Paraná</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="logo"><img src="img/SIMPLIFICA-Photoroom.png" alt="" id="simplifica"></div>
    <nav>
      <a href="#">Início</a>
      <a href="#">Atividades</a>
      <a href="#">Pendências</a>
      <a href="#">Conta</a>
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-circle" viewBox="0 0 16 16">
        <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
        <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
    </svg>
    </nav>
  </header>

  <section class="banner">
    <div class="banner-text">
      <h1>Bem-vindo ao Simplifica Paraná!</h1>
      <p>Sua plataforma de educação no Paraná</p>
    </div>
  </section>

  <section class="cards">

    <div class="card" onclick="abrirPlataforma('Redacao')"> <span class="alerta" id="alerta-Redacao"></span><img src="img/redação-Photoroom.png" alt=""></div>
    <div class="card" onclick="abrirPlataforma('Leia')"> <span class="alerta" id="alerta-Leia"></span><img src="img/leia-Photoroom.png" alt=""></div>
    <div class="card" onclick="abrirPlataforma('Teens')"> <span class="alerta" id="alerta-Teens"></span><img src="img/ingles_teens-Photoroom.png" alt=""></div>
    <div class="card" onclick="abrirPlataforma('High')"> <span class="alerta" id="alerta-High"></span><img src="img/ingles_hight-Photoroom.png" alt=""></div>
    <div class="card" onclick="abrirPlataforma('Desafio')"> <span class="alerta" id="alerta-Desafio"></span><img src="img/desafiopr-Photoroom.png" alt=""></div>

    <div class="card" onclick="abrirPlataforma('Khan')"> <span class="alerta" id="alerta-Khan"></span><img src="img/khan_academy.png" alt=""></div>
    <div class="card" onclick="abrirPlataforma('Matific')"> <span class="alerta" id="alerta-Matific"></span><img src="img/matific-Photoroom.png" alt=""></div>
    <div class="card" onclick="abrirPlataforma('Class')"> <span class="alerta" id="alerta-Class"></span><img src="img/class.png" alt=""></div>
    <div class="card" onclick="abrirPlataforma('Quizziz')"> <span class="alerta" id="alerta-Quizziz"></span><img src="img/quizziz-Photoroom.png" alt=""></div>

    <div class="progress">
      <span id="porcentagem">0%</span>
      <p>Percentual Total</p>
    </div>
  </section>

  <section id="tarefas">
    <h2 id="titulo"></h2>

    <input type="text" id="inputTarefa" placeholder="Nova Tarefa" class="input_tarefas">
    <input type="datetime-local" id="data" class="input_tarefas">
    <button onclick="adicionarTarefa()" id="adicionar">Adicionar</button>
    <button onclick="fecharTarefas()" id="voltar">Voltar</button>

    <ul id="lista"></ul>
    
  </section>
  
  <script src="script.js"></script>
</body>
</html>
